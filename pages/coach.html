<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코치 소개 | 컨디셔닝 서폿</title>
    <!-- 상위 폴더 탈출 후 소문자 css 폴더 내 style.css 로드 -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="coach-page">

    <!-- 고정 상단 영역 -->
    <div class="fixed-top-area">
        <div class="top-slogan-banner">
            <div class="container text-center">
             <span>안산 최초 스포츠 컨디셔닝 전문 센터</span>
            </div>
        </div>

        <header>
            <div class="header-container">
                <!-- 좌측 로고 (메인 이동) -->
                <div class="logo"><a href="../index.html" style="text-decoration:none; color:#111;">컨디셔닝 서폿</a></div>
                
                <!-- 상단 네비게이션 메뉴 6개 완벽 동기화 및 경로 매칭 -->
                <nav id="main-nav">
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="../pages/about.html">서폿 소개</a></li>
                        <li><a href="./coach.html" class="active">코치 소개</a></li>
                        <li><a href="../pages/pricing.html">가격 안내</a></li>
                        <li><a href="../pages/reviews.html">후기 모음</a></li>
                        <li><a href="../pages/contact.html">문의하기</a></li>
                    </ul>
                </nav>

                <!-- 우측 예약 버튼 -->
                <div class="header-right-group">
                    <a href="../pages/contact.html" class="btn-top-accent">예약하기</a>
                    
                    <button class="menu-toggle-btn" id="menuToggle">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
        </header>
    </div>

    <!-- 타이틀 영역 -->
    <section class="sub-page-hero text-center">
        <div class="container">
            <h1 class="sub-title">COACHES</h1>
            <p class="sub-desc">포스터를 클릭하면 자격 정보 및 경력 사항을 크게 확인하실 수 있습니다.</p>
        </div>
    </section>

    <!-- PC 3열(2행 3열), 태블릿 2열, 모바일 1열 반응형 코치 그리드 목록 섹션 -->
    <section class="section-padding bg-light" style="padding-top: 40px;">
        <div class="container">
            <div class="coach-image-grid">
                
                <!-- 💡 1번째 코치 카드 (JJH.jpg) -->
               <div class="coach-image-card" onclick="openModal('../assets/LEG.jpg')">
                    <div class="coach-poster-wrapper">
                        <img src="../assets/LEG.jpg" alt="코치 LEG">
                    </div>
                </div>

                <!-- 💡 2번째 코치 카드 (KNH.jpg) -->
                <div class="coach-image-card" onclick="openModal('../assets/JJH.jpg')">
                    <div class="coach-poster-wrapper">
                        <!-- 기존의 회색 글씨 박스 대신 실제 디자인 이미지를 넣었습니다 -->
                        <img src="../assets/JJH.jpg" alt="대표 코치 JJH">
                    </div>
                </div>

                <!-- 💡 3번째 코치 카드 (LEG.jpg) -->
                <div class="coach-image-card" onclick="openModal('../assets/SHS.jpg')">
                    <div class="coach-poster-wrapper">
                        <img src="../assets/SHS.jpg" alt="코치 SHS">
                    </div>
                </div>

                <!-- 💡 4번째 코치 카드 (LJS.jpg) -->
                <div class="coach-image-card" onclick="openModal('../assets/KNH.jpg')">
                    <div class="coach-poster-wrapper">
                        <img src="../assets/KNH.jpg" alt="코치 KNH">
                    </div>
                </div>

                <!-- 💡 5번째 코치 카드 (SHS.jpg) -->
                <div class="coach-image-card" onclick="openModal('../assets/LJS.jpg')">
                    <div class="coach-poster-wrapper">
                        <img src="../assets/LJS.jpg" alt="코치 LJS">
                    </div>
                </div>

                <!-- 6번째 공석 카드 (채용 공고) -->
                <div class="coach-image-card recruiting-card">
                    <div class="coach-poster-wrapper">
                        <div class="coach-poster-placeholder recruiting">
                            <h3>WE ARE HIRING</h3>
                            <p>컨디셔닝 서폿과 함께할<br>스포츠 과학 전문가를 모십니다.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- 클릭 시 확대되는 팝업 라이트박스 모달 -->
    <div id="imageModal" class="image-modal" onclick="closeModal()">
        <span class="modal-close-btn">&times;</span>
        <img class="modal-image-content" id="modalImg" alt="확대된 코치 프로필">
    </div>

    <!-- 하단 푸터 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 컨디셔닝 서폿(SUPPOT). All Rights Reserved.</p>
        </div>
    </footer>

    <!-- 모바일 메뉴 동작 및 이미지 확대 팝업 스크립트 -->
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('main-nav');

        menuToggle.addEventListener('click', () => {
            mainNav.classList.toggle('active');
            menuToggle.classList.toggle('open');
        });

        // 팝업 열기 함수
        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modal.classList.add('show');
            
            // 💡 이제 임시 사이트 주소가 아닌, 클릭한 카드의 실제 포스터 이미지 주소가 팝업에 바인딩됩니다!
            modalImg.src = imgSrc; 
        }

        // 팝업 닫기 함수
        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('show');
        }
    </script>

</body>
</html>
