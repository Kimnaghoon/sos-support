<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협업 및 제휴 문의 | 컨디셔닝 서폿</title>
    <!-- 상위 폴더 탈출 후 소문자 css 폴더 내 style.css 로드 -->
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 페이지 전용 레이아웃 스타일 */
        .collab-container { 
            max-width: 800px; 
            margin: 80px auto; 
            padding: 40px; 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #1a2536; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 1rem;
        }
        .submit-btn { 
            width: 100%; 
            padding: 15px; 
            background: #0052cc; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1rem;
            transition: background 0.3s;
        }
        .submit-btn:hover { background: #0041a3; }
    </style>
</head>
<body>

    <!-- 헤더 영역 -->
    <header class="fixed-top-area">
        <div class="header-container" style="padding: 15px 5%;">
            <div class="logo"><a href="../index.html" style="text-decoration:none; color:#111; display:flex; align-items:center; gap:10px;"><img src="../assets/logo.jpg" alt="로고" style="height:30px;">스포츠 컨디셔닝 서폿</a></div>
            <div class="header-right-group">
                <a href="./contact.html" class="btn-top-accent">예약하기</a>
            </div>
        </div>
    </header>
<!-- 고정 상단 영역 -->
    <div class="fixed-top-area">
        <div class="top-slogan-banner">
            <div class="container text-center">
                <span>안산 최초 스포츠 컨디셔닝 전문 센터 </span>
            </div>
        </div>
        <header>
            <div class="header-container">
                <div class="logo"><a href="./index.html" style="text-decoration:none; color:#111;">스포츠 컨디셔닝 서폿</a></div>
                <nav id="main-nav">
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="./about.html" >서폿 소개</a></li>
                        <li><a href="./coach.html">코치 소개</a></li>
                        <li><a href="./pricing.html">가격 안내</a></li>
                        <li><a href="./reviews.html">후기 모음</a></li>
                        <li><a href="./contact.html" class="active">문의하기</a></li>
                    </ul>
                </nav>
                <div class="header-right-group">
                    <a href="https://map.naver.com/p/search/%EC%95%88%EC%82%B0%20%EC%84%9C%ED%8F%BF/place/1297992851?placePath=/ticket?bk_query=%EC%95%88%EC%82%B0%20%EC%84%9C%ED%8F%BF&from=map&fromPanelNum=2&timestamp=202606231609&locale=ko&svcName=map_pcv5&searchText=%EC%95%88%EC%82%B0%20%EC%84%9C%ED%8F%BF&entry=pll&fromNxList=true&filterType=%EC%97%85%EC%B2%B4&bk_query=%EC%95%88%EC%82%B0%20%EC%84%9C%ED%8F%BF&searchType=place&c=13.53,0,0,0,dh" class="btn-top-accent">예약하기</a>
                    <button class="menu-toggle-btn" id="menuToggle">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
        </header>
    </div>
    <!-- 본문 영역 -->
    <section style="padding-top: 120px; padding-bottom: 80px;">
        <div class="container collab-container">
            <h2 class="text-center" style="margin-bottom: 30px;">협업 및 제휴 문의</h2>
            <form action="mailto:your-email@example.com" method="post" enctype="text/plain">
                <div class="form-group">
                    <label>회사명 / 단체명</label>
                    <input type="text" name="company" placeholder="단체명을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>담당자 연락처</label>
                    <input type="text" name="contact" placeholder="연락 가능한 번호를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>문의 내용</label>
                    <textarea name="message" rows="5" placeholder="제휴 제안 내용을 상세히 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>
    </section>

    <!-- 하단 푸터 -->
    <footer style="background-color: #1a1a1a; color: #999; padding: 40px 0; text-align: center; font-size: 0.8rem;">
        <div class="container">
            <p>&copy; 2026 컨디셔닝 서폿(SUPPOT) 안산점. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
