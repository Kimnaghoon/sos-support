<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 | 컨디셔닝 서폿</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 문의하기 페이지 상세 폼 스타일 */
        .contact-details-box {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #eef2f6;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            flex-grow: 1; /* 남은 공간을 차지하도록 설정 */
        }
        .detail-line {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .detail-line .label-tag {
            font-weight: 800;
            color: #0052cc;
            min-width: 90px;
            font-size: 0.95rem;
        }
        .detail-line .val-text {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .naver-booking-btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            background-color: #03c75a;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(3, 199, 90, 0.2);
            transition: background-color 0.2s, transform 0.2s;
        }
        .naver-booking-btn:hover {
            background-color: #02b351;
            transform: translateY(-2px);
        }
        
        /* 💡 2단 레이아웃 핵심 설정 */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 좌우 1:1 비율 */
            gap: 30px;
            align-items: start;
        }

        /* 정사각형 지도 컨테이너 */
        .map-container {
            width: 100%; 
            padding-top: 100%; /* 가로세로 1:1 정사각형 */
            position: relative; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #eef2f6;
            background-color: #f8f9fa;
        }
        .map-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* 정보 및 버튼 묶음 컨테이너 */
        .info-button-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        @media screen and (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr; /* 모바일에서는 1열 */
            }
        }
    </style>
</head>
<body>

    <div class="fixed-top-area">
        <div class="top-slogan-banner">
            <div class="container text-center">
                <span>안산 최초 스포츠 컨디셔닝 전문 센터</span>
            </div>
        </div>
        <header>
            <div class="header-container">
                <div class="logo"><a href="../index.html" style="text-decoration:none; color:#111;">컨디셔닝 서폿</a></div>
                <nav id="main-nav">
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="./about.html">서폿 소개</a></li>
                        <li><a href="./coach.html">코치 소개</a></li>
                        <li><a href="./pricing.html">가격 안내</a></li>
                        <li><a href="./reviews.html">후기 모음</a></li>
                        <li><a href="./contact.html" class="active">문의하기</a></li>
                    </ul>
                </nav>
                <div class="header-right-group">
                    <a href="./contact.html" class="btn-top-accent">예약하기</a>
                    <button class="menu-toggle-btn" id="menuToggle">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
        </header>
    </div>

    <section class="sub-page-hero text-center">
        <div class="container">
            <h1 class="sub-title">CONTACT US</h1>
            <p class="sub-desc" style="color: #0052cc; font-weight: 700;">지점 위치와 실시간 예약 스케줄을 확인해 주세요.</p>
        </div>
    </section>

    <section class="section-padding bg-light" style="padding-top: 20px;">
        <div class="container">
            <!-- 💡 좌측 지도 | 우측 설명+버튼 2단 레이아웃 -->
            <div class="contact-grid">
                
                <!-- 왼쪽: 정사각형 지도 -->
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d890.3895770978405!2d126.83146783874334!3d37.319117772871365!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b6f0473f0b6c9%3A0x6d7749e7a9a639a0!2z7JeQ7J207Iqk7YOA7JuM!5e0!3m2!1sko!2skr!4v1782208017306!5m2!1sko!2skr" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

                <!-- 오른쪽: 설명칸(위) + 예약버튼(아래) -->
                <div class="info-button-wrapper">
                    <div class="contact-details-box">
                        <div class="detail-line">
                            <span class="label-tag">📍 찾아오시는 길</span>
                            <span class="val-text">경기도 안산시 단원구 고잔로 54<br>에이스타워 2층 209호</span>
                        </div>
                        <div class="detail-line">
                            <span class="label-tag">🕒 운영 시간</span>
                            <span class="val-text">10:00 - 22:00</span>
                        </div>
                        <div class="detail-line">
                            <span class="label-tag">💡 안내 사항</span>
                            <span class="val-text">
                                • 야간 퇴근 후 케어 가능<br>
                                • 사전 예약제 운영<br>
                                • 전용 주차장 완비
                            </span>
                        </div>
                    </div>
                    
                    <a href="https://pcmap.place.naver.com/place/1297992851/ticket?bk_query=%EC%95%88%EC%82%B0%20%EC%84%9C%ED%8F%BF&entry=pll&fromNxList=true&fromPanelNum=2&timestamp=202606231609&locale=ko&svcName=map_pcv5&searchText=%EC%95%88%EC%82%B0%20%EC%84%9C%ED%8F%BF&filterType=%EC%97%85%EC%B2%B4" target="_blank" class="naver-booking-btn">
                        💚 실시간 스케줄 확인 및 네이버 예약하기
                    </a>
                </div>

            </div>
        </div>
    </section>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('main-nav');
        menuToggle.addEventListener('click', () => {
            mainNav.classList.toggle('active');
            menuToggle.classList.toggle('open');
        });
    </script>
</body>
</html>
